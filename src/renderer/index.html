<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net https://api.openai.com https://api.anthropic.com">
  <title>OpenDev IDE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-tertiary: #2d2d30;
      --text-primary: #cccccc;
      --text-secondary: #858585;
      --accent: #0e639c;
      --accent-hover: #1177bb;
      --border: #3c3c3c;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .toolbar button {
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      cursor: pointer;
      border-radius: 3px;
      font-size: 13px;
    }

    .toolbar button:hover {
      background: var(--accent);
    }

    .toolbar .title {
      margin-left: auto;
      color: var(--text-secondary);
      font-size: 12px;
    }

    /* Main content */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 10px 12px;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .file-item {
      padding: 4px 12px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-item:hover {
      background: var(--bg-tertiary);
    }

    .file-item.active {
      background: var(--accent);
    }

    .file-icon {
      width: 16px;
      height: 16px;
      display: inline-block;
    }

    /* Editor area */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .editor-tabs {
      display: flex;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }

    .editor-tab {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .editor-tab.active {
      background: var(--bg-primary);
    }

    .editor-tab .close {
      opacity: 0.5;
      cursor: pointer;
    }

    .editor-tab .close:hover {
      opacity: 1;
    }

    .editor-container {
      flex: 1;
      overflow: hidden;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      padding: 4px 12px;
      background: var(--accent);
      font-size: 12px;
      gap: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .welcome h1 {
      font-size: 32px;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .welcome p {
      margin-bottom: 24px;
    }

    .welcome button {
      padding: 10px 24px;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 3px;
      font-size: 14px;
    }

    .welcome button:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div class="toolbar">
      <button id="btn-open">📂 打开文件</button>
      <button id="btn-save">💾 保存</button>
      <button id="btn-new">📄 新建文件</button>
      <span class="title">OpenDev IDE - AI全栈自动开发IDE</span>
    </div>

    <!-- Main content -->
    <div class="main-content">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">文件浏览器</div>
        <div class="file-tree" id="file-tree">
          <div class="file-item" style="color: var(--text-secondary); padding: 20px;">
            点击"打开文件"选择项目文件夹
          </div>
        </div>
      </div>

      <!-- Editor area -->
      <div class="editor-area">
        <!-- Welcome screen -->
        <div class="welcome" id="welcome">
          <h1>OpenDev IDE</h1>
          <p>AI全栈自动开发IDE - 运行于OpenClaw</p>
          <button id="btn-welcome-open">📂 打开项目</button>
        </div>

        <!-- Editor (hidden by default) -->
        <div class="editor-container" id="editor-container" style="display: none;">
          <div id="monaco-editor"></div>
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-item" id="status-file">📄 未打开文件</div>
      <div class="status-item" id="status-encoding">UTF-8</div>
      <div class="status-item" id="status-language">JavaScript</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script>
    // State
    let currentFile = null;
    let editor = null;
    let monacoLoaded = false;

    // DOM Elements
    const btnOpen = document.getElementById('btn-open');
    const btnSave = document.getElementById('btn-save');
    const btnNew = document.getElementById('btn-new');
    const btnWelcomeOpen = document.getElementById('btn-welcome-open');
    const welcome = document.getElementById('welcome');
    const editorContainer = document.getElementById('editor-container');
    const statusFile = document.getElementById('status-file');
    const statusLanguage = document.getElementById('status-language');
    const fileTree = document.getElementById('file-tree');

    // Initialize Monaco Editor
    function initMonaco() {
      if (monacoLoaded) return;
      
      require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
      require(['vs/editor/editor.main'], function () {
        monacoLoaded = true;
        
        editor = monaco.editor.create(document.getElementById('monaco-editor'), {
          value: '',
          language: 'javascript',
          theme: 'vs-dark',
          automaticLayout: true,
          fontSize: 14,
          minimap: { enabled: true },
          scrollBeyondLastLine: false,
          renderWhitespace: 'selection',
          tabSize: 2
        });

        console.log('Monaco Editor initialized');
      });
    }

    // Show editor
    function showEditor() {
      welcome.style.display = 'none';
      editorContainer.style.display = 'block';
      initMonaco();
    }

    // Update status
    function updateStatus(filePath, language) {
      statusFile.textContent = '📄 ' + (filePath ? filePath.split(/[\\/]/).pop() : '未打开文件');
      statusLanguage.textContent = language || 'JavaScript';
    }

    // Get language from file extension
    function getLanguage(filePath) {
      const ext = filePath.split('.').pop().toLowerCase();
      const langMap = {
        'js': 'javascript',
        'jsx': 'javascript',
        'ts': 'typescript',
        'tsx': 'typescript',
        'html': 'html',
        'htm': 'html',
        'css': 'css',
        'scss': 'scss',
        'less': 'less',
        'json': 'json',
        'md': 'markdown',
        'py': 'python',
        'java': 'java',
        'cpp': 'cpp',
        'c': 'c',
        'go': 'go',
        'rs': 'rust',
        'sql': 'sql',
        'xml': 'xml',
        'yaml': 'yaml',
        'yml': 'yaml'
      };
      return langMap[ext] || 'plaintext';
    }

    // Open file
    async function openFile() {
      try {
        const result = await window.electronAPI.openFile();
        if (result) {
          currentFile = result.filePath;
          showEditor();
          
          if (editor) {
            const language = getLanguage(currentFile);
            monaco.editor.setModelLanguage(editor.getModel(), language);
            editor.setValue(result.content);
          }
          
          updateStatus(currentFile, getLanguage(currentFile));
          console.log('File opened:', currentFile);
        }
      } catch (error) {
        console.error('Error opening file:', error);
      }
    }

    // Save file
    async function saveFile() {
      if (!currentFile || !editor) return;
      
      try {
        const content = editor.getValue();
        const result = await window.electronAPI.saveFile({
          filePath: currentFile,
          content: content
        });
        
        if (result) {
          console.log('File saved:', result);
        }
      } catch (error) {
        console.error('Error saving file:', error);
      }
    }

    // New file
    function newFile() {
      currentFile = null;
      showEditor();
      
      if (editor) {
        editor.setValue('');
        monaco.editor.setModelLanguage(editor.getModel(), 'javascript');
      }
      
      updateStatus(null, 'JavaScript');
    }

    // Event listeners
    btnOpen.addEventListener('click', openFile);
    btnSave.addEventListener('click', saveFile);
    btnNew.addEventListener('click', newFile);
    btnWelcomeOpen.addEventListener('click', openFile);

    // Menu events from main process
    window.electronAPI.onMenuOpenFile(() => openFile());
    window.electronAPI.onMenuSaveFile(() => saveFile());

    console.log('OpenDev IDE initialized');
  </script>
</body>
</html>
