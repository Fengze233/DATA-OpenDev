<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net https://api.openai.com https://api.anthropic.com">
  <title>OpenDev IDE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-tertiary: #2d2d30;
      --text-primary: #cccccc;
      --text-secondary: #858585;
      --accent: #0e639c;
      --accent-hover: #1177bb;
      --border: #3c3c3c;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }

    .toolbar button {
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      cursor: pointer;
      border-radius: 3px;
      font-size: 13px;
    }

    .toolbar button:hover {
      background: var(--accent);
    }

    .toolbar .title {
      margin-left: auto;
      color: var(--text-secondary);
      font-size: 12px;
    }

    /* Main content */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 10px 12px;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    .file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .file-item {
      padding: 4px 12px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-item:hover {
      background: var(--bg-tertiary);
    }

    .file-item.active {
      background: var(--accent);
    }

    .file-icon {
      width: 16px;
      height: 16px;
      display: inline-block;
    }

    /* Editor area */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .editor-tabs {
      display: flex;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }

    .editor-tab {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .editor-tab.active {
      background: var(--bg-primary);
    }

    .editor-tab .close {
      opacity: 0.5;
      cursor: pointer;
    }

    .editor-tab .close:hover {
      opacity: 1;
    }

    .editor-container {
      flex: 1;
      overflow: hidden;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      padding: 4px 12px;
      background: var(--accent);
      font-size: 12px;
      gap: 16px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .welcome h1 {
      font-size: 32px;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .welcome p {
      margin-bottom: 24px;
    }

    .welcome button {
      padding: 10px 24px;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 3px;
      font-size: 14px;
    }

    .welcome button:hover {
      background: var(--accent-hover);
    }

    /* AI Panel */
    .ai-panel {
      position: fixed;
      right: 0;
      top: 0;
      width: 350px;
      height: 100vh;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
    }

    .ai-panel-header {
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }

    .ai-btn-close {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
    }

    .ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ai-message {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ai-message.user {
      background: var(--accent);
      align-self: flex-end;
      max-width: 90%;
    }

    .ai-message.assistant {
      background: var(--bg-tertiary);
      align-self: flex-start;
      max-width: 90%;
    }

    .ai-message.error {
      background: #5a1d1d;
      color: #ff8888;
    }

    .ai-input-area {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .ai-input-area textarea {
      flex: 1;
      padding: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 4px;
      resize: none;
      height: 60px;
      font-family: inherit;
    }

    .ai-input-area button {
      padding: 8px 16px;
      background: var(--accent);
      border: none;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    .ai-input-area button:hover {
      background: var(--accent-hover);
    }

    .ai-input-area button:disabled {
      background: var(--bg-tertiary);
      cursor: not-allowed;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-content {
      background: var(--bg-secondary);
      padding: 24px;
      border-radius: 8px;
      width: 400px;
      max-width: 90%;
    }

    .modal-content h3 {
      margin-bottom: 12px;
    }

    .modal-content input {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 4px;
    }

    /* Toolbar AI button */
    .toolbar .ai-btn {
      margin-left: 8px;
      padding: 6px 12px;
      background: #10a37f;
      border: none;
    }

    .toolbar .ai-btn:hover {
      background: #1a7f64;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Toolbar -->
    <div class="toolbar">
      <button id="btn-open">📂 打开文件</button>
      <button id="btn-save">💾 保存</button>
      <button id="btn-new">📄 新建文件</button>
      <span class="title">OpenDev IDE - AI全栈自动开发IDE</span>
    </div>

    <!-- Main content -->
    <div class="main-content">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">文件浏览器</div>
        <div class="file-tree" id="file-tree">
          <div class="file-item" style="color: var(--text-secondary); padding: 20px;">
            点击"打开文件"选择项目文件夹
          </div>
        </div>
      </div>

      <!-- Editor area -->
      <div class="editor-area">
        <!-- Welcome screen -->
        <div class="welcome" id="welcome">
          <h1>OpenDev IDE</h1>
          <p>AI全栈自动开发IDE - 运行于OpenClaw</p>
          <button id="btn-welcome-open">📂 打开项目</button>
        </div>

        <!-- Editor (hidden by default) -->
        <div class="editor-container" id="editor-container" style="display: none;">
          <div id="monaco-editor"></div>
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-item" id="status-file">📄 未打开文件</div>
      <div class="status-item" id="status-encoding">UTF-8</div>
      <div class="status-item" id="status-language">JavaScript</div>
      <div class="status-item" id="status-ai">🤖 AI: 未配置</div>
    </div>
  </div>

  <!-- AI Chat Panel -->
  <div id="ai-panel" class="ai-panel" style="display: none;">
    <div class="ai-panel-header">
      <span>🤖 AI 助手</span>
      <button id="ai-close" class="ai-btn-close">×</button>
    </div>
    <div class="ai-messages" id="ai-messages"></div>
    <div class="ai-input-area">
      <textarea id="ai-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
      <button id="ai-send">发送</button>
    </div>
  </div>

  <!-- AI Config Modal -->
  <div id="ai-config-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>🤖 配置 AI</h3>
      <p>请输入 OpenAI API Key:</p>
      <input type="password" id="api-key-input" placeholder="sk-..." style="width: 100%; padding: 8px; margin: 10px 0;">
      <div style="display: flex; gap: 8px; justify-content: flex-end;">
        <button id="ai-config-cancel" style="padding: 6px 12px;">取消</button>
        <button id="ai-config-save" style="padding: 6px 12px; background: var(--accent); color: white; border: none; border-radius: 3px;">保存</button>
      </div>
    </div>
  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script>
    // State
    let currentFile = null;
    let editor = null;
    let monacoLoaded = false;

    // DOM Elements
    const btnOpen = document.getElementById('btn-open');
    const btnSave = document.getElementById('btn-save');
    const btnNew = document.getElementById('btn-new');
    const btnWelcomeOpen = document.getElementById('btn-welcome-open');
    const welcome = document.getElementById('welcome');
    const editorContainer = document.getElementById('editor-container');
    const statusFile = document.getElementById('status-file');
    const statusLanguage = document.getElementById('status-language');
    const fileTree = document.getElementById('file-tree');

    // Initialize Monaco Editor
    function initMonaco() {
      if (monacoLoaded) return;
      
      require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
      require(['vs/editor/editor.main'], function () {
        monacoLoaded = true;
        
        editor = monaco.editor.create(document.getElementById('monaco-editor'), {
          value: '',
          language: 'javascript',
          theme: 'vs-dark',
          automaticLayout: true,
          fontSize: 14,
          minimap: { enabled: true },
          scrollBeyondLastLine: false,
          renderWhitespace: 'selection',
          tabSize: 2
        });

        console.log('Monaco Editor initialized');
      });
    }

    // Show editor
    function showEditor() {
      welcome.style.display = 'none';
      editorContainer.style.display = 'block';
      initMonaco();
    }

    // Update status
    function updateStatus(filePath, language) {
      statusFile.textContent = '📄 ' + (filePath ? filePath.split(/[\\/]/).pop() : '未打开文件');
      statusLanguage.textContent = language || 'JavaScript';
    }

    // Get language from file extension
    function getLanguage(filePath) {
      const ext = filePath.split('.').pop().toLowerCase();
      const langMap = {
        'js': 'javascript',
        'jsx': 'javascript',
        'ts': 'typescript',
        'tsx': 'typescript',
        'html': 'html',
        'htm': 'html',
        'css': 'css',
        'scss': 'scss',
        'less': 'less',
        'json': 'json',
        'md': 'markdown',
        'py': 'python',
        'java': 'java',
        'cpp': 'cpp',
        'c': 'c',
        'go': 'go',
        'rs': 'rust',
        'sql': 'sql',
        'xml': 'xml',
        'yaml': 'yaml',
        'yml': 'yaml'
      };
      return langMap[ext] || 'plaintext';
    }

    // Open file
    async function openFile() {
      try {
        const result = await window.electronAPI.openFile();
        if (result) {
          currentFile = result.filePath;
          showEditor();
          
          if (editor) {
            const language = getLanguage(currentFile);
            monaco.editor.setModelLanguage(editor.getModel(), language);
            editor.setValue(result.content);
          }
          
          updateStatus(currentFile, getLanguage(currentFile));
          console.log('File opened:', currentFile);
        }
      } catch (error) {
        console.error('Error opening file:', error);
      }
    }

    // Save file
    async function saveFile() {
      if (!currentFile || !editor) return;
      
      try {
        const content = editor.getValue();
        const result = await window.electronAPI.saveFile({
          filePath: currentFile,
          content: content
        });
        
        if (result) {
          console.log('File saved:', result);
        }
      } catch (error) {
        console.error('Error saving file:', error);
      }
    }

    // New file
    function newFile() {
      currentFile = null;
      showEditor();
      
      if (editor) {
        editor.setValue('');
        monaco.editor.setModelLanguage(editor.getModel(), 'javascript');
      }
      
      updateStatus(null, 'JavaScript');
    }

    // Event listeners
    btnOpen.addEventListener('click', openFile);
    btnSave.addEventListener('click', saveFile);
    btnNew.addEventListener('click', newFile);
    btnWelcomeOpen.addEventListener('click', openFile);

    // Menu events from main process
    window.electronAPI.onMenuOpenFile(() => openFile());
    window.electronAPI.onMenuSaveFile(() => saveFile());

    // AI Chat functionality
    const aiPanel = document.getElementById('ai-panel');
    const aiMessages = document.getElementById('ai-messages');
    const aiInput = document.getElementById('ai-input');
    const aiSend = document.getElementById('ai-send');
    const aiClose = document.getElementById('ai-close');
    const aiModal = document.getElementById('ai-config-modal');
    const apiKeyInput = document.getElementById('api-key-input');
    const aiConfigSave = document.getElementById('ai-config-save');
    const aiConfigCancel = document.getElementById('ai-config-cancel');
    const statusAI = document.getElementById('status-ai');
    const btnToolbarAI = document.getElementById('btn-ai');

    let aiConfigured = false;
    let aiConversation = [];

    // Add AI button to toolbar
    const aiToolbarBtn = document.createElement('button');
    aiToolbarBtn.id = 'btn-ai';
    aiToolbarBtn.textContent = '🤖 AI';
    aiToolbarBtn.style.background = '#10a37f';
    document.querySelector('.toolbar').appendChild(aiToolbarBtn);

    // Check AI configuration
    async function checkAIConfig() {
      try {
        const result = await window.electronAPI.ai.isConfigured();
        aiConfigured = result.configured;
        statusAI.textContent = aiConfigured ? '🤖 AI: 已就绪' : '🤖 AI: 未配置';
      } catch (e) {
        console.error('Failed to check AI config:', e);
      }
    }

    // Show AI panel
    function showAIPanel() {
      if (!aiConfigured) {
        aiModal.style.display = 'flex';
        return;
      }
      aiPanel.style.display = 'flex';
    }

    // Hide AI panel
    function hideAIPanel() {
      aiPanel.style.display = 'none';
    }

    // Add message to chat
    function addAIMessage(content, role) {
      const div = document.createElement('div');
      div.className = `ai-message ${role}`;
      div.textContent = content;
      aiMessages.appendChild(div);
      aiMessages.scrollTop = aiMessages.scrollHeight;
    }

    // Send message to AI
    async function sendAIMessage() {
      const message = aiInput.value.trim();
      if (!message || !aiConfigured) return;

      // Add user message
      addAIMessage(message, 'user');
      aiConversation.push({ role: 'user', content: message });
      aiInput.value = '';
      aiSend.disabled = true;

      try {
        const result = await window.electronAPI.ai.chat(aiConversation);
        
        if (result.success) {
          const response = result.response.content;
          addAIMessage(response, 'assistant');
          aiConversation.push({ role: 'assistant', content: response });
        } else {
          addAIMessage(`错误: ${result.error}`, 'error');
        }
      } catch (e) {
        addAIMessage(`错误: ${e.message}`, 'error');
      }

      aiSend.disabled = false;
      aiInput.focus();
    }

    // Save API key
    async function saveAPIKey() {
      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) return;

      try {
        const result = await window.electronAPI.ai.setApiKey(apiKey);
        if (result.success) {
          aiConfigured = true;
          statusAI.textContent = '🤖 AI: 已就绪';
          aiModal.style.display = 'none';
          apiKeyInput.value = '';
          showAIPanel();
        }
      } catch (e) {
        alert('配置失败: ' + e.message);
      }
    }

    // Event listeners
    aiToolbarBtn.addEventListener('click', showAIPanel);
    aiClose.addEventListener('click', hideAIPanel);
    aiSend.addEventListener('click', sendAIMessage);
    aiConfigSave.addEventListener('click', saveAPIKey);
    aiConfigCancel.addEventListener('click', () => {
      aiModal.style.display = 'none';
    });

    aiInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendAIMessage();
      }
    });

    // Initialize AI
    checkAIConfig();

    console.log('OpenDev IDE initialized');
  </script>
</body>
</html>
